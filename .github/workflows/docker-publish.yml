# Publish the GRID WARS image to Docker Hub whenever a GitHub release is
# published. The release tag (e.g. 1.1.0) becomes the image tag, plus `latest`
# and a `MAJOR.MINOR` tag. Also syncs DOCKER.md to the Docker Hub overview.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  — your Docker Hub username (loosecannons)
#   DOCKERHUB_TOKEN     — a Docker Hub access token with Read/Write/Delete
#                         (Account → Security → New Access Token)
name: Publish Docker image

on:
  release:
    types: [published]
  workflow_dispatch:        # allow a manual rebuild of :latest from the default branch
    inputs:
      tag:
        description: "Optional extra tag to publish (e.g. 1.1.1)"
        required: false

env:
  IMAGE: docker.io/loosecannons/grid-wars

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # On a release the ref is the tag (e.g. 1.1.0) → version/major.minor.
          # `latest` is applied automatically for the highest semver release.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync Docker Hub overview from DOCKER.md
        continue-on-error: true   # description sync needs an account-scoped token; never fail the publish over it
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: loosecannons/grid-wars
          short-description: "TRON-themed 3D hex strategy game (three.js): single-player vs the MCP and online multiplayer."
          readme-filepath: ./DOCKER.md
